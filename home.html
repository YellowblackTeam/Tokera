<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tokera</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
background:url("https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/57992d3d-b37f-4eb3-8d98-e2e09749ac20/dj5puy7-1c1d652f-0555-46a2-bc58-866e87da71b7.png") no-repeat center center fixed;
background-size:cover;
}

/* TOPBAR */
#topbar{
background:rgba(0,0,0,0.6);
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* MENU GRID */
#menu{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:20px;
}

/* CARDS */
.card{
background:linear-gradient(#2c5f9e,#1e3f6d);
border-radius:10px;
padding:20px;
text-align:center;
cursor:pointer;
box-shadow:0 0 10px rgba(0,0,0,0.5);
transition:0.2s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:80px;
margin-bottom:10px;
}

/* USERS */
.userCard{
background:rgba(0,0,0,0.6);
padding:10px;
margin:5px;
border-radius:8px;
}

.online{color:#00ff88;}
.offline{color:#aaa;}
</style>
</head>

<body>

<div id="topbar">
<div>Tokera</div>
<div id="userInfo">...</div>
</div>

<div id="content"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase,ref,get,set,onValue,onDisconnect }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* FIREBASE */
const firebaseConfig={
apiKey:"AIzaSyBzWOV7rpIQTB43cJtJMOuSazm6KxfMQP4",
authDomain:"tokera-2244b.firebaseapp.com",
databaseURL:"https://tokera-2244b-default-rtdb.firebaseio.com",
projectId:"tokera-2244b",
storageBucket:"tokera-2244b.firebasestorage.app",
messagingSenderId:"516093605358",
appId:"1:516093605358:web:56b055ec770a9e93270aff"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const content=document.getElementById("content");
const userInfo=document.getElementById("userInfo");

let usuarioAtual=localStorage.getItem("usuario");

/* LOGIN */
if(!usuarioAtual) mostrarLogin();
else startApp();

function mostrarLogin(){
content.innerHTML=`
<h2 style="text-align:center">Login</h2>
<center>
<input id="nome" placeholder="Usuário"><br><br>
<input id="senha" type="password" placeholder="Senha"><br><br>
<button onclick="login()">Entrar</button>
</center>
`;
}

window.login=async function(){
const nome=document.getElementById("nome").value.trim().toLowerCase();
const senha=document.getElementById("senha").value.trim();

if(!nome || !senha) return alert("Preencha tudo");

const userRef=ref(db,"usuarios/"+nome);
const snap=await get(userRef);

if(!snap.exists()){
await set(userRef,{
senha,
tokecoin:0,
online:true
});
}else if(snap.val().senha!==senha){
return alert("Senha errada");
}

localStorage.setItem("usuario",nome);
usuarioAtual=nome;
startApp();
};

/* START APP */
function startApp(){
const onlineRef=ref(db,"usuarios/"+usuarioAtual+"/online");
set(onlineRef,true);
onDisconnect(onlineRef).set(false);

/* 👇 MOSTRA MENU IMEDIATO (ANTES DO FIREBASE) */
goHome();

/* 👇 DEPOIS atualiza topbar */
onValue(ref(db,"usuarios/"+usuarioAtual),(snap)=>{
const d = snap.val() || {};

userInfo.innerHTML = `
<div style="text-align:right">
<b>${usuarioAtual}</b><br>
<span style="font-size:12px;color:#ffd700;">
<img src="./TokeCoin.png" style="width:12px;vertical-align:middle;">
${d.tokecoin || 0}
</span>
</div>
`;
});
}

/* IMPORTANTE */
goHome();
}

/* HOME */
window.goHome=function(){
content.innerHTML=`
<div id="menu">

<div class="card" onclick="openGames()">
<img src="games.png">
<div>Games</div>
</div>

<div class="card" onclick="openClub()">
<img src="club.png">
<div>Builders Club</div>
</div>

<div class="card" onclick="openProfile()">
<img src="profile.png">
<div>Profile</div>
</div>

</div>
`;
};

/* GAMES */
window.openGames=function(){
content.innerHTML="<h2>Games (em breve)</h2>";
};

/* CLUB */
window.openClub=function(){
content.innerHTML="<h2>Builders Club (em breve)</h2>";
};

/* PROFILE (TODOS USERS) */
window.openProfile=function(){
onValue(ref(db,"usuarios"), snap=>{
let html="<h2>Users</h2>";

snap.forEach(u=>{
const d=u.val();

html+=`
<div class="userCard">
<b>${u.key}</b><br>
<span class="${d.online?'online':'offline'}">
${d.online?'● Online':'● Offline'}
</span>
</div>
`;
});

content.innerHTML=html;
});
};

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tokera</title>

<style>
body{
margin:0;
background:#111;
color:white;
font-family:Arial;
}

/* TOP BAR */
#topbar{
background:#1a1a1a;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.coin{color:#ffd700;}

.verificado{
width:16px;
height:16px;
vertical-align:middle;
margin-left:5px;
}

/* CONTENT */
#content{
padding:20px;
text-align:center;
margin-bottom:90px;
}

/* DOWN BAR */
#downbar{
position:fixed;
bottom:0;
width:100%;
background:#1a1a1a;
display:flex;
justify-content:space-around;
padding:12px 0;
}

.downbtn{cursor:pointer;}

/* CARDS */
.userCard{
background:#222;
padding:10px;
border-radius:10px;
text-align:center;
}

/* 👇 AMIGOS PRO LADO */
#amigosLista{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px;
}

#amigosLista .userCard{
min-width:120px;
flex-shrink:0;
}

/* STATUS */
.online{color:#00ff88;}
.offline{color:#888;}

.btn{
margin-top:10px;
padding:6px;
border:none;
border-radius:6px;
cursor:pointer;
background:#00ff88;
width:100%;
}
</style>
</head>

<body>

<div id="topbar">
<div>Tokera</div>
<div id="userInfo">...</div>
</div>

<div id="content">Carregando...</div>

<div id="downbar">
<div class="downbtn" onclick="goHome()">Home</div>
<div class="downbtn" onclick="openUsers()">Users</div>
<div class="downbtn" onclick="openBank()">Bank</div>
<div class="downbtn" onclick="openShop()">Shop</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase,ref,get,set,update,onValue,onDisconnect }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* FIREBASE */
const firebaseConfig={
apiKey:"AIzaSyBzWOV7rpIQTB43cJtJMOuSazm6KxfMQP4",
authDomain:"tokera-2244b.firebaseapp.com",
databaseURL:"https://tokera-2244b-default-rtdb.firebaseio.com",
projectId:"tokera-2244b",
storageBucket:"tokera-2244b.firebasestorage.app",
messagingSenderId:"516093605358",
appId:"1:516093605358:web:56b055ec770a9e93270aff"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const content=document.getElementById("content");
const userInfo=document.getElementById("userInfo");

const verificados = {
  "tokera": true
};

/* LOGIN */
let usuarioAtual=localStorage.getItem("usuario");

if(!usuarioAtual) mostrarLogin();
else startApp();

function mostrarLogin(){
content.innerHTML=`
<h2>Login</h2>
<input id="nome" placeholder="Usuário"><br><br>
<input id="senha" type="password" placeholder="Senha"><br><br>
<button onclick="login()">Entrar</button>
`;
}

window.login=async function(){
const nome=document.getElementById("nome").value.trim().toLowerCase();
const senha=document.getElementById("senha").value.trim();
if(!nome||!senha) return alert("Preencha tudo");

const userRef=ref(db,"usuarios/"+nome);
const snap=await get(userRef);

if(!snap.exists()){
await set(userRef,{
senha,
tokecoin:0,
online:true,
amigos:{}
});
}else if(snap.val().senha!==senha){
return alert("Senha errada");
}

localStorage.setItem("usuario",nome);
usuarioAtual=nome;
startApp();
};

/* START */
async function startApp(){
const onlineRef=ref(db,"usuarios/"+usuarioAtual+"/online");
await set(onlineRef,true);
onDisconnect(onlineRef).set(false);

onValue(ref(db,"usuarios/"+usuarioAtual),(snap)=>{
const d=snap.val();
userInfo.innerHTML=`
<b>${usuarioAtual}</b>
<span class="coin">
<img src="./TokeCoin.png" style="width:16px;vertical-align:middle;">
${d.tokecoin||0}
</span>
`;
});

goHome();
}

/* HOME */
window.goHome=function(){
onValue(ref(db,"usuarios/"+usuarioAtual+"/amigos"), async (snap)=>{

let amigosHTML="";

if(snap.exists()){
for(const nome in snap.val()){
const userSnap = await get(ref(db,"usuarios/"+nome));
const d = userSnap.val();

amigosHTML+=`
<div class="userCard">
<b>${nome}</b>
<div class="${d.online?'online':'offline'}">
${d.online?'● Online':'● Offline'}
</div>
</div>`;
}
}else{
amigosHTML="<p>Sem amigos</p>";
}

content.innerHTML=`
<h2>Olá, ${usuarioAtual}!</h2>
<h3>Amigos:</h3>
<div id="amigosLista">
${amigosHTML}
</div>
`;
});
};

/* USERS */
window.openUsers=function(){
onValue(ref(db,"usuarios"), async snap=>{
let html="<h2>Users</h2>";

const myFriendsSnap = await get(ref(db,"usuarios/"+usuarioAtual+"/amigos"));
const meusAmigos = myFriendsSnap.exists() ? myFriendsSnap.val() : {};

snap.forEach(u=>{
const nome=u.key;
if(nome===usuarioAtual) return;

const d=u.val();
const jaAmigo = meusAmigos[nome];

html+=`
<div class="userCard">
<b>${nome}</b>
<div class="${d.online?'online':'offline'}">
${d.online?'● Online':'● Offline'}
</div>

<button class="btn"
${jaAmigo?"disabled":""}
onclick="addFriend('${nome}')">
${jaAmigo?"Amigo ✔":"Adicionar"}
</button>
</div>`;
});

content.innerHTML=html;
});
};

/* ADD FRIEND */
window.addFriend=async function(nome){
await set(ref(db,"usuarios/"+usuarioAtual+"/amigos/"+nome), true);
await set(ref(db,"usuarios/"+nome+"/amigos/"+usuarioAtual), true);

alert("Agora vocês são amigos!");
openUsers();
};

/* BANK */
window.openBank=function(){
content.innerHTML=`<h2>Bank</h2><p>Em breve...</p>`;
};

/* SHOP */
window.openShop=function(){
content.innerHTML=`<h2>Shop</h2><p>Em breve...</p>`;
};

</script>
</body>
</html>
